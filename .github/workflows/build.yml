name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pytest tests/

      - run: |
          uv run pyinstaller --onefile --name bank-statement-analyzer \
            --add-data "translations:translations" \
            --add-data "bank_analyzer/ui/help:bank_analyzer/ui/help" \
            main.py

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/bank-statement-analyzer

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pytest tests/

      - run: |
          uv run pyinstaller --onefile --noconsole --name bank-statement-analyzer `
            --add-data "translations;translations" `
            --add-data "bank_analyzer/ui/help;bank_analyzer/ui/help" `
            main.py

      - uses: softprops/action-gh-release@v3
        with:
          files: dist/bank-statement-analyzer.exe
