name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pytest tests/

      - name: Install Linux system dependencies
        run: sudo apt-get install -y libegl1

      - run: |
          uv run pyinstaller --onedir --name bank-statement-analyzer \
            --add-data "translations:translations" \
            --add-data "bank_analyzer/ui/help:bank_analyzer/ui/help" \
            --add-data "tests/fixtures:tests/fixtures" \
            main.py
          find dist/bank-statement-analyzer/_internal -name "libxkbcommon*.so*" -delete
          tar -czf dist/bank-statement-analyzer-linux.tar.gz \
            -C dist bank-statement-analyzer

      - uses: actions/upload-artifact@v7
        with:
          name: bank-statement-analyzer-linux
          path: dist/bank-statement-analyzer-linux.tar.gz

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/bank-statement-analyzer-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pytest tests/

      - run: |
          uv run pyinstaller --onefile --noconsole --name bank-statement-analyzer `
            --add-data "translations;translations" `
            --add-data "bank_analyzer/ui/help;bank_analyzer/ui/help" `
            --add-data "tests/fixtures;tests/fixtures" `
            main.py

      - name: Create demo.bat
        run: Set-Content -Path dist\demo.bat -Value "@echo off`nbank-statement-analyzer.exe --demo" -Encoding ASCII

      - uses: actions/upload-artifact@v7
        with:
          name: bank-statement-analyzer-windows
          path: |
            dist/bank-statement-analyzer.exe
            dist/demo.bat

      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/bank-statement-analyzer.exe
            dist/demo.bat
