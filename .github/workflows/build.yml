name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pyinstaller --onefile --name bank-statement-analyzer main.py

      - uses: actions/upload-artifact@v7
        with:
          name: bank-statement-analyzer-linux
          path: dist/bank-statement-analyzer

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0

      - run: uv sync

      - run: uv run pyinstaller --onefile --name bank-statement-analyzer main.py

      - uses: actions/upload-artifact@v7
        with:
          name: bank-statement-analyzer-windows
          path: dist/bank-statement-analyzer.exe
